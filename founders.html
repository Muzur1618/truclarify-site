<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruClarify Test - Simple Version</title>
<style>
body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: 50px auto;
  padding: 20px;
}
input {
  padding: 10px;
  font-size: 16px;
  width: 300px;
}
button {
  padding: 10px 20px;
  font-size: 16px;
  background: #1B44C8;
  color: white;
  border: none;
  cursor: pointer;
}
button:hover {
  background: #0F2A6B;
}
#results {
  margin-top: 20px;
  padding: 20px;
  background: #f0f0f0;
  display: none;
}
</style>
</head>
<body>

<h1>TruClarify - Test Version</h1>
<p>This is a minimal test to verify JavaScript works.</p>

<input type="text" id="nameInput" placeholder="Enter a name">
<button onclick="testCheck()">Check Name</button>

<div id="results"></div>

<script>
function testCheck() {
  const input = document.getElementById('nameInput');
  const results = document.getElementById('results');
  const name = input.value.trim();
  
  if (!name) {
    alert('Please enter a name');
    return;
  }
  
  results.style.display = 'block';
  results.innerHTML = '<h2>Results for: ' + name + '</h2><p>✓ JavaScript is working!</p><p>✓ Function was called successfully!</p><p>✓ Basic functionality confirmed!</p>';
}

// Test that script loaded
console.log('Script loaded successfully!');
</script>

</body>
</html>
